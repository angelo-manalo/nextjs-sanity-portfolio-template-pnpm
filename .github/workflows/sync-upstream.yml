name: Sync Upstream

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight UTC
  workflow_dispatch: # Allow manual triggering from GitHub Actions tab

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to fetch all history for merging
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Configure Git Bot User
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add Upstream and Fetch
        run: |
          git remote add upstream https://github.com/sanity-io/template-nextjs-personal-website.git
          git fetch upstream main

      - name: Merge Upstream Changes
        run: |
          # Merge upstream changes, allowing unrelated histories if needed
          git merge upstream/main --allow-unrelated-histories -m "chore: merge upstream changes from sanity template" || {
            echo "Conflict occurred during merge. Manual resolution required."
            exit 1
          }

      - name: Clean npm Lockfile and Update pnpm
        run: |
          # Delete package-lock.json if it was merged back in
          if [ -f package-lock.json ]; then
            rm package-lock.json
          fi
          
          # Regenerate/update the pnpm lockfile
          pnpm install --no-frozen-lockfile
          
          # Stage the package updates and lockfiles
          git add package.json pnpm-lock.yaml pnpm-workspace.yaml || true
          
          # Commit the updates if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "chore: regenerate pnpm-lock.yaml after upstream merge"
          fi

      - name: Push to Origin
        run: |
          git push origin main
