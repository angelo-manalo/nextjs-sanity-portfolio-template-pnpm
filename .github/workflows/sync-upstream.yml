name: Sync Upstream

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight UTC
  workflow_dispatch: # Allow manual triggering from GitHub Actions tab

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to fetch all history for merging
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Configure Git Bot User
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add Upstream and Fetch
        run: |
          git remote add upstream https://github.com/sanity-io/template-nextjs-personal-website.git
          git fetch upstream main

      - name: Reconcile and Merge Upstream Changes
        run: |
          # 1. Save our local package.json before the merge clobbers it
          cp package.json /tmp/local-package.json

          # 2. Run the Git merge first (do not commit yet)
          git merge upstream/main --allow-unrelated-histories --no-commit --no-ff || true

          # 3. Resolve conflicts in branding files by choosing our local versions
          git checkout --ours README.md .env.local.example vercel-installation-instructions.md || true

          # 3b. Keep our workflow files — GITHUB_TOKEN cannot push .github/workflows/ changes
          #     Use HEAD (not --ours) so new upstream workflow files are also removed
          git checkout HEAD -- .github/workflows/
          git reset HEAD -- .github/workflows/ || true

          # 4. Programmatically merge package.json from the saved local + upstream tree
          node -e "
          const fs = require('fs');
          const { execSync } = require('child_process');

          // Read our saved local package.json (pre-merge, no conflict markers)
          const localPkg = JSON.parse(fs.readFileSync('/tmp/local-package.json', 'utf8'));
          const upstreamPkg = JSON.parse(execSync('git show upstream/main:package.json').toString());

          // Merge dependencies (upstream overrides, but preserves unique local deps)
          const mergedDeps = { ...localPkg.dependencies, ...upstreamPkg.dependencies };
          const mergedDevDeps = { ...localPkg.devDependencies, ...upstreamPkg.devDependencies };

          // Merge and rewrite scripts from npm to pnpm
          const mergedScripts = { ...upstreamPkg.scripts, ...localPkg.scripts };
          for (const key in mergedScripts) {
            if (typeof mergedScripts[key] === 'string') {
              mergedScripts[key] = mergedScripts[key]
                .replace(/\bnpm run\b/g, 'pnpm')
                .replace(/\bnpm\b/g, 'pnpm');
            }
          }

          // Construct the new package.json preserving our branding
          const finalPkg = {
            ...upstreamPkg,
            name: localPkg.name,
            private: localPkg.private !== undefined ? localPkg.private : upstreamPkg.private,
            scripts: mergedScripts,
            dependencies: mergedDeps,
            devDependencies: mergedDevDeps
          };

          fs.writeFileSync('package.json', JSON.stringify(finalPkg, null, 2) + '\n');
          "

          # 5. Stage resolved files and the programmatically-merged package.json
          git add package.json README.md .env.local.example vercel-installation-instructions.md

          # 6. Remove the upstream package-lock.json if introduced
          if [ -f package-lock.json ]; then
            git rm --cached package-lock.json || true
            rm -f package-lock.json || true
          fi

          # 7. Commit the merge if other code merges cleanly
          git commit -m "chore: merge upstream changes, preserving pnpm and branding" || {
            echo "Merge conflicts exist in functional code files. Manual resolution required."
            exit 1
          }

      - name: Regenerate pnpm Lockfile
        run: |
          # Re-install dependencies using pnpm and regenerate the lockfile
          pnpm install --no-frozen-lockfile
          
          # Stage the updated lockfile and workspace files
          git add pnpm-lock.yaml pnpm-workspace.yaml || true
          
          # Commit the updated lockfile if it has changed
          if ! git diff --quiet --cached; then
            git commit -m "chore: regenerate pnpm-lock.yaml after upstream merge"
          fi

      - name: Push to Origin
        run: |
          git push origin main
